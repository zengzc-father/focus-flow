name: focus_flow
description: 极简学生自律提醒 - 低功耗，仅核心提醒功能

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI 组件
  cupertino_icons: ^1.0.6
  circular_countdown_timer: ^0.2.4
  go_router: ^13.0.0
  fl_chart: ^0.66.0

  # 状态管理
  flutter_riverpod: ^2.4.0

  # 系统服务
  flutter_local_notifications: ^16.3.0
  usage_stats: ^1.2.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  audioplayers: ^5.2.1
  workmanager: ^0.5.2
  android_alarm_manager_plus: ^3.0.4
  flutter_foreground_task: ^6.1.3

  # 本地 LLM 依赖
  ffi: ^2.1.0
  path_provider: ^2.1.2
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
